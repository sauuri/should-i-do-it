<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="이 결정, 해야 해 말아야 해? ⚖️" />
  <meta property="og:description" content="10가지 질문으로 고민되는 결정을 도와드립니다" />
  <meta property="og:image" content="https://sauuri.github.io/should-i-do-it/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://sauuri.github.io/should-i-do-it/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>이 결정, 해야 해 말아야 해?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #020d08;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #d1fae5;
      overflow-x: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 65% 10%, #10b98118 0%, transparent 55%),
                  radial-gradient(ellipse at 20% 90%, #06402018 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(#10b98108 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute; opacity: 0;
      animation: floatUp var(--dur, 8s) var(--delay, 0s) infinite ease-in;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.45; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) scale(1) rotate(360deg); opacity: 0; }
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 20px; }

    /* ── INTRO ── */
    .intro-card {
      padding: 44px 28px;
      text-align: center;
    }
    .intro-icon { font-size: 72px; display: block; margin-bottom: 20px; animation: tilt 2.5s ease-in-out infinite; }
    @keyframes tilt {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50%       { transform: rotate(8deg) scale(1.06); }
    }
    .intro-title {
      font-size: 28px; font-weight: 800; margin-bottom: 6px;
      background: linear-gradient(135deg, #34d399, #10b981);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .intro-tagline { font-size: 13px; color: #2a5a38; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 20px; }
    .intro-desc { font-size: 15px; color: #4a7a58; line-height: 1.85; margin-bottom: 16px; }
    .intro-desc strong { color: #34d399; }
    .intro-note {
      display: inline-flex; align-items: center; gap: 6px;
      background: #0a1e10; border: 1px solid #1a3a22;
      border-radius: 50px; padding: 6px 16px;
      font-size: 12px; color: #3a6a48;
      margin-bottom: 30px;
    }
    .start-btn {
      background: linear-gradient(135deg, #059669, #10b981);
      color: white; border: none;
      padding: 16px 52px; border-radius: 50px;
      font-size: 18px; font-weight: 700; cursor: pointer;
      transition: all 0.3s; font-family: inherit;
      box-shadow: 0 6px 24px #10b98133;
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px #10b98155; }
    .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── INPUT SCREEN ── */
    .screen { display: none; }
    .screen.active { display: block; }

    .input-card {
      background: #04120a;
      border: 1px solid #1a3a22;
      border-radius: 24px;
      padding: 32px 26px;
      position: relative; overflow: hidden;
    }
    .input-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #10b98116 0%, transparent 55%);
      pointer-events: none;
    }
    .input-card h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; color: #d1fae5; }
    .input-card p { font-size: 14px; color: #3a6a48; margin-bottom: 20px; }
    .input-card textarea {
      width: 100%;
      background: #020d08;
      border: 1.5px solid #1a3a22;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      color: #d1fae5;
      font-family: inherit;
      resize: none;
      height: 90px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-card textarea:focus { border-color: #10b981; box-shadow: 0 0 0 3px #10b98115; }
    .input-card textarea::placeholder { color: #1a3a22; }
    .input-examples {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; margin-bottom: 28px;
    }
    .example-chip {
      background: #0a1e10; border: 1px solid #1a3a22; border-radius: 50px;
      padding: 6px 14px; font-size: 13px; color: #4a7a58; cursor: pointer;
      transition: all 0.2s;
    }
    .example-chip:hover { border-color: #10b981; color: #34d399; background: #0f2a18; }

    /* ── QUIZ ── */
    .quiz-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .back-btn {
      background: #0a1e10; border: 1.5px solid #1a3a22; border-radius: 12px;
      padding: 8px 14px; font-size: 18px; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0; color: #4a7a58; font-family: inherit;
      line-height: 1;
    }
    .back-btn:hover { border-color: #10b981; color: #34d399; }
    .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .progress-wrap { flex: 1; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .progress-label { font-size: 12px; color: #3a6a48; font-weight: 700; }
    .progress-count { font-size: 12px; color: #3a6a48; }
    .progress-bar { width: 100%; height: 4px; background: #0a1e10; border-radius: 2px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #059669, #10b981, #34d399);
      border-radius: 2px; transition: width 0.4s ease;
      box-shadow: 0 0 8px #10b98155;
    }

    .card {
      background: #04120a;
      border: 1px solid #1a3a22;
      border-radius: 24px;
      padding: 32px 26px;
      box-shadow: 0 8px 40px #10b9810a;
    }
    .question-card { animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px) scale(0.97); }
      to   { opacity: 1; transform: translateX(0)   scale(1);    }
    }
    .decision-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: #0a1e10; border: 1px solid #1a3a22;
      border-radius: 50px; padding: 6px 14px;
      font-size: 13px; color: #4a7a58;
      margin-bottom: 20px; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .q-emoji { font-size: 38px; display: block; margin-bottom: 14px; }
    .q-num { font-size: 11px; font-weight: 700; color: #10b98188; letter-spacing: 1px; margin-bottom: 8px; }
    .q-text { font-size: 19px; font-weight: 700; line-height: 1.5; margin-bottom: 24px; color: #d1fae5; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: #020d08;
      border: 1.5px solid #1a3a22;
      border-radius: 14px;
      padding: 14px 16px;
      text-align: left; cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 12px;
      font-size: 15px; color: #4a7a58; font-family: inherit;
    }
    .option-btn:hover  { background: #0a1e10; border-color: #10b981; color: #d1fae5; transform: translateX(4px); }
    .option-btn.selected { background: linear-gradient(135deg, #0a2010, #061a0e); border-color: #10b981; color: #d1fae5; }
    .option-icon { font-size: 22px; flex-shrink: 0; }

    /* ── RESULT ── */
    .result-card {
      background: #04120a;
      border: 1px solid #1a3a22;
      border-radius: 24px;
      padding: 32px 26px;
      box-shadow: 0 8px 40px #10b9810a;
    }
    .result-hero { text-align: center; margin-bottom: 20px; }
    .result-emoji { font-size: 80px; display: block; margin-bottom: 16px; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both; }
    @keyframes popIn { from { transform: scale(0) rotate(-10deg); } to { transform: scale(1) rotate(0deg); } }
    .result-badge {
      display: inline-block; padding: 6px 20px; border-radius: 50px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 14px;
      border: 1px solid;
    }
    .result-title { font-size: 26px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; }
    .result-about {
      display: inline-block; background: #0a1e10; border: 1px solid #1a3a22;
      border-radius: 50px; padding: 6px 18px;
      font-size: 13px; color: #4a7a58; margin-bottom: 12px;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .result-sub { font-size: 14px; color: #3a6a48; line-height: 1.85; }

    .meter-wrap { margin: 22px 0; }
    .meter-labels { display: flex; justify-content: space-between; font-size: 12px; color: #3a6a48; margin-bottom: 8px; }
    .meter { width: 100%; height: 10px; background: #0a1e10; border-radius: 5px; overflow: visible; position: relative; }
    .meter-fill { height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .meter-marker {
      position: absolute; top: -4px; width: 18px; height: 18px;
      border-radius: 50%;
      transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateX(-50%);
    }

    .advice {
      background: linear-gradient(135deg, #0a2010, #061a0e);
      border: 1px solid #10b98122;
      border-radius: 16px; padding: 18px; margin-bottom: 24px; text-align: left;
    }
    .advice-title { font-size: 11px; color: #10b98188; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; }
    .advice-text { font-size: 14px; color: #4a7a58; line-height: 1.85; }

    .action-btns { display: flex; flex-direction: column; gap: 10px; }
    .primary-btn {
      background: linear-gradient(135deg, #059669, #10b981);
      color: white; border: none;
      padding: 14px; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #10b98144; }
    .secondary-btn {
      background: #020d08; color: #4a7a58;
      border: 1.5px solid #1a3a22;
      padding: 14px; border-radius: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .secondary-btn:hover { border-color: #10b98144; color: #d1fae5; }

    /* ── VERDICT THEMES ── */
    .verdict-no  .result-badge  { background: #1e0a0a; color: #f87171; border-color: #f8717133; }
    .verdict-no  .result-title  { color: #f87171; }
    .verdict-no  .meter-fill    { background: linear-gradient(90deg, #991b1b, #f87171); }
    .verdict-no  .meter-marker  { background: #f87171; box-shadow: 0 0 8px #f87171; }

    .verdict-wait .result-badge { background: #1e140a; color: #fbbf24; border-color: #fbbf2433; }
    .verdict-wait .result-title { color: #fbbf24; }
    .verdict-wait .meter-fill   { background: linear-gradient(90deg, #92400e, #fbbf24); }
    .verdict-wait .meter-marker { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }

    .verdict-yes  .result-badge { background: #0a1e0a; color: #4ade80; border-color: #4ade8033; }
    .verdict-yes  .result-title { color: #4ade80; }
    .verdict-yes  .meter-fill   { background: linear-gradient(90deg, #166534, #4ade80); }
    .verdict-yes  .meter-marker { background: #4ade80; box-shadow: 0 0 8px #4ade80; }

    .verdict-now  .result-badge { background: #0a1e12; color: #34d399; border-color: #34d39933; }
    .verdict-now  .result-title { color: #34d399; }
    .verdict-now  .meter-fill   { background: linear-gradient(90deg, #059669, #34d399); }
    .verdict-now  .meter-marker { background: #34d399; box-shadow: 0 0 8px #34d399; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #04120a; border: 1px solid #10b98144; color: #34d399;
      padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600;
      z-index: 999; transition: transform 0.3s; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <!-- INTRO -->
  <div id="screen-intro">
    <div class="intro-card">
      <span class="intro-icon">⚖️</span>
      <div class="intro-title">이 결정,<br>해야 해 말아야 해?</div>
      <div class="intro-tagline">결정 판정기</div>
      <div class="intro-desc">
        고민되는 결정이 있어?<br>
        <strong>10가지 질문</strong>으로<br>
        해야 할지 말지 판단해줄게.<br>
        뭐든 입력해봐. 진지하게 봐줄게.
      </div>
      <div class="intro-note">💡 솔직하게 답해야 정확해</div>
      <button class="start-btn" onclick="showInput()">결정 넣기 →</button>
    </div>
  </div>

  <!-- INPUT SCREEN -->
  <div class="screen" id="screen-input">
    <div class="input-card">
      <h2>고민되는 결정이 뭐야?</h2>
      <p>짧게라도 적어봐. 질문할 때 보여줄게.</p>
      <textarea id="decision-input" placeholder="예) 퇴사하기, 고백하기, 유학 가기, 이사하기..." maxlength="50"></textarea>
      <div class="input-examples">
        <span class="example-chip" onclick="setDecision('퇴사하기')">퇴사하기</span>
        <span class="example-chip" onclick="setDecision('고백하기')">고백하기</span>
        <span class="example-chip" onclick="setDecision('이직하기')">이직하기</span>
        <span class="example-chip" onclick="setDecision('여행 가기')">여행 가기</span>
        <span class="example-chip" onclick="setDecision('연락하기')">연락하기</span>
        <span class="example-chip" onclick="setDecision('사과하기')">사과하기</span>
      </div>
      <div style="text-align:center">
        <button class="start-btn" id="quiz-start-btn" onclick="startQuiz()" disabled>질문 시작 →</button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <button class="back-btn" id="back-btn" onclick="goBack()" disabled>←</button>
      <div class="progress-wrap">
        <div class="progress-info">
          <span class="progress-label">⚖️ 결정 분석 중</span>
          <span class="progress-count" id="prog-count">1 / 10</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="card" id="qcard-wrap">
      <div class="decision-tag" id="decision-tag"></div>
      <div class="question-card" id="qcard"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-card" id="result-card"></div>
  </div>
</div>

<div class="toast" id="toast">링크 복사됐어! 🔗</div>

<script>
  // Particles
  const PARTICLES = ['💡','🌿','✨','🎯','💚','🍀','⭐'];
  const pc = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = PARTICLES[i % PARTICLES.length];
    p.style.left = Math.random() * 100 + '%';
    p.style.setProperty('--dur', (7 + Math.random() * 8) + 's');
    p.style.setProperty('--delay', (Math.random() * 9) + 's');
    p.style.fontSize = (11 + Math.random() * 10) + 'px';
    pc.appendChild(p);
  }

  let decisionText = '';
  let cur = 0;
  let answers = [];

  const input = document.getElementById('decision-input');
  const quizStartBtn = document.getElementById('quiz-start-btn');
  input.addEventListener('input', () => { quizStartBtn.disabled = input.value.trim().length === 0; });

  function setDecision(val) { input.value = val; quizStartBtn.disabled = false; }

  function showInput() {
    document.getElementById('screen-intro').style.display = 'none';
    document.getElementById('screen-input').classList.add('active');
  }

  const questions = [
    { emoji: '⏳', text: '이걸 얼마나 오래 생각해왔어?',
      options: [
        { icon: '⚡',  text: '오늘 처음 생각했어', score: 0 },
        { icon: '📅',  text: '며칠~몇 주 됐어', score: 1 },
        { icon: '🗓️', text: '꽤 오래 고민해온 거야', score: 2 },
      ]},
    { emoji: '🚪', text: '지금 안 하면 기회가 사라져?',
      options: [
        { icon: '♾️', text: '아니, 나중에도 할 수 있어', score: 0 },
        { icon: '⏰', text: '기회가 점점 줄어들 수 있어', score: 1 },
        { icon: '🔒', text: '지금 아니면 못 해', score: 2 },
      ]},
    { emoji: '😰', text: '안 했을 때 나중에 후회할 것 같아?',
      options: [
        { icon: '😶', text: '별로 후회 안 할 것 같아', score: 0 },
        { icon: '😕', text: '조금 아쉬울 것 같아', score: 1 },
        { icon: '😭', text: '엄청 후회할 것 같아', score: 2 },
      ]},
    { emoji: '↩️', text: '잘못됐을 때 되돌릴 수 있어?',
      options: [
        { icon: '🔒', text: '한 번 하면 거의 못 돌려', score: 0 },
        { icon: '🔧', text: '좀 어렵지만 수습 가능해', score: 1 },
        { icon: '🔄', text: '쉽게 되돌릴 수 있어', score: 2 },
      ]},
    { emoji: '💪', text: '현실적으로 지금 가능해?',
      options: [
        { icon: '❌', text: '솔직히 지금은 무리야', score: 0 },
        { icon: '😤', text: '어렵지만 할 수 있어', score: 1 },
        { icon: '✅', text: '충분히 가능해', score: 2 },
      ]},
    { emoji: '👥', text: '믿는 사람한테 말했을 때 반응이?',
      options: [
        { icon: '🙅', text: '말렸어 / 말릴 것 같아', score: 0 },
        { icon: '🤷', text: '반반이야', score: 1 },
        { icon: '🙌', text: '응원해줬어 / 줄 것 같아', score: 2 },
      ]},
    { emoji: '🧠', text: '직감이 뭐라고 해?',
      options: [
        { icon: '🛑',       text: '하지 말라고', score: 0 },
        { icon: '😶‍🌫️', text: '잘 모르겠어', score: 1 },
        { icon: '✨',       text: '하라고', score: 2 },
      ]},
    { emoji: '😨', text: '망설이는 가장 큰 이유가 뭐야?',
      options: [
        { icon: '📉', text: '실패 확률이 너무 높아서', score: 0 },
        { icon: '❓', text: '아직 확신이 없어서', score: 1 },
        { icon: '😅', text: '그냥 용기가 부족해서', score: 2 },
      ]},
    { emoji: '🔭', text: '1년 후에 이 결정을 돌아보면?',
      options: [
        { icon: '😮‍💨', text: '안 한 게 맞았다고 생각할 것 같아', score: 0 },
        { icon: '🌀',    text: '어떻게 됐을지 모르겠어', score: 1 },
        { icon: '🌟',    text: '했다면 잘한 거라고 생각할 것 같아', score: 2 },
      ]},
    { emoji: '❤️', text: '솔직히 하고 싶어?',
      options: [
        { icon: '😶', text: '아니, 해야 할 것 같아서 고민하는 거야', score: 0 },
        { icon: '😐', text: '반반이야', score: 1 },
        { icon: '🔥', text: '응, 진짜 하고 싶어', score: 2 },
      ]},
  ];

  const verdicts = [
    { cls: 'verdict-no',   emoji: '🛑', badge: '지금은 아니야',   title: '하지 마',
      sub: '지금 이 결정은 때가 아닌 것 같아.\n억지로 밀어붙이면 더 힘들어질 수 있어.',
      advice: '안 하는 것도 결정이야. 지금은 더 준비하거나 더 좋은 타이밍을 기다리는 게 나을 것 같아.' },
    { cls: 'verdict-wait', emoji: '🤔', badge: '좀 더 생각해봐', title: '아직 확신이 없어',
      sub: '완전 나쁜 것도 아니고 완전 좋은 것도 아니야.\n조건이 좀 더 갖춰지면 더 명확해질 것 같아.',
      advice: '한 가지만 더 생각해봐: 지금 망설이는 게 두려움 때문인지, 진짜 준비 부족 때문인지.' },
    { cls: 'verdict-yes',  emoji: '✅', badge: '해봐',           title: '준비된 것 같아',
      sub: '분석해보니 해볼 만한 결정이야.\n실패해도 수습할 수 있고, 안 하면 후회할 것 같아.',
      advice: '망설이는 이유가 두려움이라면, 두려움은 준비가 덜 된 게 아니라 중요하다는 신호야. 해봐.' },
    { cls: 'verdict-now',  emoji: '🚀', badge: '당장 해',        title: '뭘 망설여?',
      sub: '이건 그냥 용기 문제야.\n조건도 되고, 직감도 그렇고, 후회도 할 것 같잖아.',
      advice: '나중에 하려고 아껴두는 건 없어. 지금이 최적의 타이밍이야. 오늘 당장 첫 걸음만 내딛어.' },
  ];

  function startQuiz() {
    decisionText = input.value.trim();
    document.getElementById('screen-input').classList.remove('active');
    document.getElementById('screen-quiz').classList.add('active');
    document.getElementById('decision-tag').innerHTML = `🤔 "${decisionText}"`;
    cur = 0; answers = [];
    renderQ(0);
  }

  function renderQ(idx) {
    const q = questions[idx];
    document.getElementById('prog-fill').style.width = (idx / questions.length * 100) + '%';
    document.getElementById('prog-count').textContent = `${idx + 1} / ${questions.length}`;
    document.getElementById('back-btn').disabled = idx === 0;
    const card = document.getElementById('qcard');
    card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
    card.innerHTML = `
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-num">질문 ${idx + 1}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option-btn" onclick="pick(${i}, ${o.score})">
            <span class="option-icon">${o.icon}</span>
            <span>${o.text}</span>
          </button>`).join('')}
      </div>`;
  }

  function pick(optIdx, score) {
    document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');
    document.querySelectorAll('.option-btn')[optIdx].classList.add('selected');
    answers[cur] = score;
    setTimeout(() => {
      cur++;
      if (cur < questions.length) renderQ(cur);
      else showResult();
    }, 380);
  }

  function goBack() {
    if (cur === 0) {
      document.getElementById('screen-quiz').classList.remove('active');
      document.getElementById('screen-input').classList.add('active');
    } else {
      answers.length = cur - 1;
      cur--;
      renderQ(cur);
    }
  }

  function showResult() {
    document.getElementById('screen-quiz').classList.remove('active');
    document.getElementById('screen-result').classList.add('active');

    const total = answers.reduce((a, b) => a + b, 0);
    let vi;
    if (total <= 5) vi = 0;
    else if (total <= 10) vi = 1;
    else if (total <= 15) vi = 2;
    else vi = 3;

    const v = verdicts[vi];
    const pct = Math.round((total / 20) * 100);

    document.getElementById('result-card').innerHTML = `
      <div class="result-hero ${v.cls}">
        <span class="result-emoji">${v.emoji}</span>
        <div class="result-badge">${v.badge}</div>
        <div class="result-title">${v.title}</div>
        <div class="result-about">🤔 "${decisionText}"</div>
        <div class="result-sub">${v.sub.replace('\n', '<br>')}</div>
      </div>
      <div class="meter-wrap ${v.cls}">
        <div class="meter-labels"><span>하지 마</span><span>${pct}점</span><span>당장 해</span></div>
        <div class="meter">
          <div class="meter-fill" id="mfill" style="width:0%"></div>
          <div class="meter-marker" id="mmark" style="left:0%"></div>
        </div>
      </div>
      <div class="advice">
        <div class="advice-title">💡 결정에 도움이 될 한마디</div>
        <div class="advice-text">${v.advice}</div>
      </div>
      <div style="text-align:center;margin:0 0 20px">
        <ins class="kakao_ad_area" style="display:none;"
          data-ad-unit="DAN-PVu656ucRpjzw2zW"
          data-ad-width="320"
          data-ad-height="50"></ins>
      </div>
      <div class="action-btns">
        <button class="primary-btn" onclick="retry()">🔄 다른 결정 넣기</button>
        <button class="secondary-btn" onclick="copyResult()">🔗 공유하기</button>
      </div>`;

    setTimeout(() => {
      const mf = document.getElementById('mfill');
      const mm = document.getElementById('mmark');
      if (mf) mf.style.width = pct + '%';
      if (mm) mm.style.left = pct + '%';
    }, 300);

    if (vi === 3) launchConfetti();
  }

  function retry() {
    answers = []; cur = 0;
    document.getElementById('screen-result').classList.remove('active');
    document.getElementById('screen-intro').style.display = '';
    input.value = '';
    quizStartBtn.disabled = true;
  }

  function copyResult() {
    navigator.clipboard.writeText(location.href).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    });
  }

  function launchConfetti() {
    const colors = ['#10b981','#34d399','#6ee7b7','#a7f3d0','#059669','#fbbf24'];
    for (let i = 0; i < 70; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        const size = 6 + Math.random() * 7;
        c.style.cssText = `
          position:fixed; pointer-events:none; z-index:100;
          left:${Math.random() * 100}vw; top:-12px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          animation:confettiFall ${1.5 + Math.random() * 2}s ease-in forwards;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 35);
    }
  }
</script>
<script async src="//t1.kakaocdn.net/kas/static/ba.min.js" charset="utf-8"></script>
</body>
